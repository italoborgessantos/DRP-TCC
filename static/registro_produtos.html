<!DOCTYPE html>
<html lang="en">    
<head>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3/build/jwt-decode.min.js"></script>
  <script type="module" src="/static/js/isCookie.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!--Acima imports para impedir acesso a pagina do front de qualquer jeito-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Stock Management</title>
</head>
  <body class="container" style="background-color: #d4edda;">

    <div class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="card shadow p-4 mt-5" style="width: 100%; max-width: 800px;">
        <h3 class="text-center mb-4">Registrar Produto</h3>
  
        <form id="formProduto">
          <div class="mb-3">
            <label for="Produto" class="form-label">Produto</label>
            <input
              type="text"
              id="produto"
              class="form-control"
              placeholder="Digite o nome do Produto"
              required
            />
          </div>

          <div class="mb-3">
            <label for="Categoria" class="form-label">Categoria</label>
            <input
              type="text"
              id="categoria"
              class="form-control"
              placeholder="Digite a categoria do Produto"
            />
          </div>

          <div class="mb-3">
            <label for="Estoque" class="form-label">Estoque</label>
            <input
              type="number"
              id="estoque"
              class="form-control"
              placeholder="Digite a quantidade em estoque"
              required
            />
          </div>

          <div class="mb-3">
            <label for="Descricao" class="form-label">Descricao</label>
            <input
              type="text"
              id="descricao"
              class="form-control"
              placeholder="Digite a descricao do produto"
            />
          </div>
          
          <div class="mb-3">
            <label for="Preço" class="form-label">Preço</label>
            <input
              type="number"
              id="preco"
              class="form-control"
              placeholder="Digite o preço do produto"
              required
            />
          </div>
           
          <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="/dashboard" class="btn btn-link ml-4">Voltar para Dashboard</a>
            <button class="btn btn-primary mr-4 w-50 padd">Cadastrar Produto</button>
          </div>
        
        </form>
      </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>   
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script type="module" src="/static/js/produtos.js"></script>
</body>
</html>
