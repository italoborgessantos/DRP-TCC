<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3/build/jwt-decode.min.js"></script>
        <script type="module" src="/static/js/isCookie.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="/static/js/produtos.js"></script>
      
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Stock Management</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
      </head>
      <body>
        <div class="container mt-5">
          <div class="card shadow-sm">
            <div class="card-header bg-info text-white d-flex  align-items-center ">
              <h5 class="mb-0">Produtos</h5>
             
             <div class="ml-auto">
              <a href="/dashboard" class="btn btn-light btn-sm"><!-- Link para voltar a dashboard -->
                <i class="bi bi-arrow-left-square"></i> Voltar
              </a>
            </div>
              <button class="btn-light btn-sm ml-4"  onclick="window.location.href='/produtos/novo'">
                <i class="bi bi-plus-circle"></i> Novo Produto
              </button>
              
            </div>
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="thead-light">
                  <tr>
                    <th>id</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Descricao</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tabela-produtos">
                  <!-- Dados carregados via JavaScript -->
                </tbody>
              </table>
              <div id="paginacao" class="d-flex align-items-center p-3">
               
            </div>
   
          </div>
        </div>
        
       
        
      </body> 


</html>
