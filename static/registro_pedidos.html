<!DOCTYPE html>
<html lang="en">    
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Stock Management</title>
</head>
  <body class="container" style="background-color: #d4edda;">

    <div class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="card shadow p-4 mt-5" style="width: 100%; max-width: 1000px;">
        <h2 class="text-center mb-4">Registrar Pedido</h2>
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
          <meta charset="UTF-8">
          <title>Pedidos</title>
          <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        </head>
        <body>
          <form id="formPedido">
            <div class="mb-3">
              <label for="cliente">Cliente:</label>
              <select id="cliente" name="cliente_id" required></select>
            </div>
            <div class="mb-3">
            <label for="produto">Produto:</label>
            <select id="produto" name="produto_id" required></select>
          </div>
           <div class="mb-3">
            <label for="Quantidade">Quantidade:</label>
            <input 
            type="number" 
            id="quantidade" 
            name="quantidade" 
            class="form-control"
            placeholder="Digite a quantidade:"
            required min=1
            />
          </div>
            <div class="d-flex justify-content-between align-items-center mt-4">         
                <a href="/dashboard" class="btn btn-light btn-md ml-4"><!-- Link para voltar a dashboard -->
                  <i class="bi bi-arrow-left-square"></i> Voltar
                </a>
              
              <button type="submit" class="btn btn-primary mr-4 w-50 padd">Cadastrar Pedido</button>
            </div>
          </form>
          <h3 class="text-center mb-4 mt-3">Pedidos</h3>
          <div class="justify-content-center align-items-center ml-6 mt-1">
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="thead-light">
                  <tr>
                    <th>id Cliente</th>
                    <th>id Produto</th>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Descrição</th>
                    <th>Data</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tabela-pedidos">
                  <!-- Dados carregados via JavaScript -->
                </tbody>
              </table>
              <div id="paginacao" class="d-flex align-items-center p-3">
                <!-- Paginacao carregada via JavaScript -->
            </div>
            </div>
        </div>
      </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>   
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script type="module" src="/static/js/pedidos.js"></script>
</body>
</html>
