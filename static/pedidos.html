<!DOCTYPE html>
<html lang="pt-br">
    <head>
      
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Stock Management</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
      </head>
      <body>
        <div class="container mt-5">
          <div class="card shadow-sm">
            <div class="card-header bg-info text-white d-flex align-items-center">
              <h5 class="mb-0">Pedidos</h5>

              <div class="ml-auto">
                <a href="/dashboard" class="btn btn-light btn-sm"><!-- Link para voltar a dashboard -->
                  <i class="bi bi-arrow-left-square"></i> Voltar
                </a>
              </div>
              <button class="btn btn-light btn-sm ml-4" id="criar_pedido">
                <i class="bi bi-plus-circle"></i> Novo Pedido
              </button>
            </div>
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="thead-light">
                  <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Descrição</th>
                    <th>Data de Pedido</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tabela-pedidos">
                  <!-- Dados carregados via JavaScript -->
                </tbody>
              </table>
              <div id="paginacao" class="d-flex align-items-center p-3">
                <!-- Paginacao carregada via JavaScript -->
            </div>
          </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="/static/script.js"></script>
      </body> 


</html>
