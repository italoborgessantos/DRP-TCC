<!DOCTYPE html>
<html lang="en">    
<head>

    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3/build/jwt-decode.min.js"></script>
    <script type="module" src="/static/js/isCookie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Stock Management</title>
</head>
  <body class="container" style="background-color: #d4edda;">

    <div class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="card shadow p-4 mt-5" style="width: 100%; max-width: 800px;">
        <h3 class="text-center mb-4">Registrar Usuário</h3>
  
        <form id="formCliente"> 
          <div class="mb-3">
            <label for="Nome" class="form-label">Nome</label>
            <input
              type="text"
              id="nome"
              class="form-control"
              placeholder="Digite seu nome"
              required
            />
          </div>

          <div class="mb-3">
            <label for="Email" class="form-label">Email</label>
            <input
              type="text"
              id="email"
              class="form-control"
              placeholder="Digite seu email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="Telefone" class="form-label">Telefone</label>
            <input
              type="text"
              id="telefone"
              class="form-control"
              placeholder="Digite seu telefone"
              
            />
          </div>
          
          <div class="mb-3">
            <label for="Endereço" class="form-label">Endereço</label>
            <input
              type="text"
              id="endereco"
              class="form-control"
              placeholder="Digite seu endereço"
              
            />
          </div>
           
          <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="/dashboard" class="btn btn-link ml-4">Voltar para Dashboard</a>
            <button type='submit'class="btn btn-primary mr-4 w-50 padd">Cadastrar Usuário</button>
          </div>
        
        </form>
      </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script type="module" src="/static/js/clientes.js"></script>
</body>
</html>
