
<!DOCTYPE html>
 <html lang="en">    
 <head>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
     <title>My Web App</title>
 </head>
 <body>
   <body class="container" style="background-color: #d4edda;">
 
     <div class="d-flex justify-content-center align-items-center min-vh-100">
       <div class="card shadow p-4 mt-5" style="width: 100%; max-width: 400px;">
         <h3 class="text-center mb-4">Login</h3>
   
         <form id="formItem">
           <div class="mb-3">
             <label for="email" class="form-label">Email</label>
             <input
               type="text"
               id="email"
               class="form-control"
               placeholder="Digite seu email"
               required
             />
           </div>
   
           <div class="mb-3">
             <label for="senha" class="form-label">Senha</label>
             <input
               type="password"
               id="senha"
               class="form-control"
               placeholder="Digite sua senha"
               required
             />
           </div>
   
           <button class="btn btn-primary w-50 padd" type="submit">Entrar</button>
           <a href="/cadastro.html" class="btn btn-link ml-5">Cadastrar</a>
          
         
         </form>
       </div>
     </div>
     
 <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
 <script src="script.js"></script>
 </body>
 </html>
